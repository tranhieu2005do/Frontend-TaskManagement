server {
    listen 80;
    listen 443 ssl;
    server_name localhost;

    # certificate ssl dùng để bật https
    ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    root /usr/share/nginx/html;
    index index.html;

    # Security Headers 
    # chống tấn công web : clickjacking, đoán mime type, xss, kiểm soát referrer
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Cache Static Assets
    # Hashed assets (JS/CSS bundles) — cache 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon & icons — cache 1 week
    location ~* \.(svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA Fallback
    # All routes fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Reverse Proxy 
    # Proxy API requests to backend service
    location /api/ {
        proxy_pass http://backend-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket Proxy 
    # Proxy WebSocket connections
    location /ws {
        proxy_pass http://backend-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Deny Hidden Files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
